climate_start:
  name: Start remote climate
  description: Starts the Koleos remote climate control.
  fields:
    temperature:
      name: Temperature
      description: Target cabin temperature in Celsius.
      required: false
      example: 22
      selector:
        number:
          min: 16
          max: 30
          step: 1
          mode: box
    minutes:
      name: Duration
      description: Remote climate duration in minutes.
      required: false
      example: 10
      selector:
        number:
          min: 5
          max: 30
          step: 1
          mode: box

climate_stop:
  name: Stop remote climate
  description: Stops the Koleos remote climate control.

remote_command:
  name: Remote command
  description: Sends an experimental remote command to the vehicle.
  fields:
    command:
      name: Command
      description: Remote command to execute.
      required: true
      example: hvac_start
      selector:
        select:
          options:
            - hvac_start
            - hvac_stop
    payload:
      name: Payload
      description: Optional command payload.
      required: false
      selector:
        object: {}
